name: Build Mac App

on:
  push:
  workflow_dispatch:  # позволяет запускать вручную

jobs:
  build:
    runs-on: macos-latest  # используем macOS

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller  # или py2app
        pip install -r requirements.txt  # установка ваших зависимостей

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed your_script.py  # замените на имя вашего скрипта

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: dist/  # папка с собранным приложением